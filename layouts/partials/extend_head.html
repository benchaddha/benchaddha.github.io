{{ if .Params.math }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" integrity="sha384-5TcZemv2l/9On385z///+d7MSYlvIEw9FuZTIdZ14vJLqWphw7e7ZPuOiCHJcFCP" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js" integrity="sha384-cMkvdD8LoxVzGF/RPUKAcvmm49FQ0oxwDF3BGKtDXcEc+T1b2N+teh/OJfpU0jr6" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js" integrity="sha384-hCXGrW6PitJEwbkoStFjeJxv+fSOOQKOPbJxSfM6G5sWZjAyWhXiTIIAmQqnlLlh" crossorigin="anonymous" onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}, {left: '\\[', right: '\\]', display: true}]});"></script>
{{ end }}

<style>
.main {
  max-width: 760px;
}

.header {
  border-bottom: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
  backdrop-filter: blur(8px);
}

.nav {
  padding-block: 14px;
  gap: 16px;
}

.logo a {
  font-weight: 700;
  letter-spacing: 0.01em;
}

#menu {
  align-items: center;
  gap: 8px;
}

#menu li + li {
  margin-inline-start: 0;
}

#menu a {
  padding: 8px 12px;
  border-radius: 999px;
  color: var(--secondary);
  transition: background-color .2s ease, color .2s ease;
}

#menu a:hover {
  background: var(--tertiary);
  color: var(--primary);
}

#menu .active {
  color: var(--primary);
  background: var(--tertiary);
}

@media (max-width: 820px) {
  .nav {
    flex-wrap: wrap;
    justify-content: center;
    padding-top: 12px;
    padding-bottom: 10px;
  }

  .logo {
    width: 100%;
    justify-content: center;
  }

  #menu {
    justify-content: center;
  }
}

.post-content .home-current-focus {
  margin-top: 1.1rem;
  margin-bottom: 2rem;
  letter-spacing: 0.02em;
  color: var(--secondary);
}

.post-content .home-current-focus span {
  color: var(--primary);
}

.home-section-label {
  margin: 0.6rem 0 0.9rem;
  color: var(--secondary);
  font-size: .9rem;
}

.home-section-label ~ .post-entry {
  border: 1px solid var(--border);
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
}
</style>
